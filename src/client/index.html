<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Miru</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%89%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Miru</div>
    <div id="server-status" class="server-status">Connecting…</div>
  </header>

  <main id="shell" class="shell">
    <aside class="pane pane-left">
      <div class="pane-header pane-header-left">
        <div class="pane-title">Agents</div>
      </div>

      <form id="create-agent-form" class="create-agent-form">
        <input id="agent-cwd" type="text" name="cwd" placeholder="Folder path" autocomplete="off" spellcheck="false">
        <input id="agent-name" type="text" name="name" placeholder="Name (optional)" autocomplete="off" spellcheck="false">
        <input id="agent-workspace" type="text" name="workspaceName" placeholder="Branch / workspace name (optional)" autocomplete="off" spellcheck="false">
        <div class="row-actions">
          <button class="primary-button create-agent-button" type="submit" aria-label="Create agent" title="Create agent">+</button>
        </div>
        <div id="create-agent-error" class="form-error"></div>
      </form>

      <div id="agent-list" class="agent-list"></div>
    </aside>

    <div id="left-splitter" class="splitter">
      <button id="toggle-left" class="splitter-toggle" type="button" title="Toggle agents pane">◂</button>
    </div>

    <section class="pane pane-center">
      <div class="selected-agent-header">
        <div class="selected-agent-meta">
          <div id="selected-agent-name" class="selected-agent-name">No agent selected</div>
          <div id="selected-agent-detail" class="selected-agent-detail">Create an agent to begin.</div>
        </div>
        <div id="selected-agent-status" class="selected-agent-status">—</div>
      </div>
      <div id="terminal-stack" class="terminal-stack"></div>
      <div id="terminal-empty" class="terminal-empty">No agent selected.</div>
    </section>

    <div id="right-splitter" class="splitter">
      <button id="toggle-right" class="splitter-toggle" type="button" title="Toggle panels pane">▸</button>
    </div>

    <aside class="pane pane-right">
      <div class="pane-header">
        <div class="pane-title">Panels</div>
      </div>
      <div id="right-pane-tabs" class="pane-tabs"></div>
      <div id="right-pane-content" class="pane-tab-content"></div>
    </aside>
  </main>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>
