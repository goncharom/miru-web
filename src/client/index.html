<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Miru</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%89%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Miru</div>
    <div id="server-status" class="server-status">Connecting…</div>
  </header>

  <main id="shell" class="shell">
    <aside id="left-pane" class="pane pane-left">
      <div class="pane-header pane-header-left">
        <div class="pane-title">Agents</div>
      </div>

      <form id="create-agent-form" class="create-agent-form">
        <input id="agent-cwd" type="text" name="cwd" placeholder="Folder path" autocomplete="off" spellcheck="false">
        <input id="agent-name" type="text" name="name" placeholder="Name (optional)" autocomplete="off" spellcheck="false">
        <div class="row-actions">
          <button class="primary-button create-agent-button" type="submit" aria-label="Create agent" title="Create agent">+</button>
        </div>
        <div id="create-agent-error" class="form-error"></div>
      </form>

      <div id="agent-list" class="agent-list"></div>
    </aside>

    <div id="left-splitter" class="splitter splitter-left">
      <button id="toggle-left" class="splitter-toggle" type="button" title="Toggle agents pane">◂</button>
    </div>

    <section id="center-pane" class="pane pane-center">
      <div id="selected-agent-header" class="selected-agent-header">
        <div class="selected-agent-meta">
          <div id="selected-agent-name" class="selected-agent-name">No agent selected</div>
          <div id="selected-agent-detail" class="selected-agent-detail">Create an agent to begin.</div>
        </div>
        <div id="selected-agent-status" class="selected-agent-status">—</div>
      </div>
      <div id="terminal-stack" class="terminal-stack"></div>
      <div id="terminal-empty" class="terminal-empty">No agent selected.</div>
    </section>

    <div id="right-splitter" class="splitter splitter-right">
      <button id="toggle-right" class="splitter-toggle" type="button" title="Toggle artifacts pane">▸</button>
    </div>

    <aside id="right-pane" class="pane pane-right">
      <div class="pane-header">
        <div class="pane-title">Artifacts</div>
      </div>

      <div class="upload-panel">
        <div class="upload-actions">
          <button id="choose-image" type="button">Choose image</button>
          <input id="image-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
        </div>
        <div id="paste-target" class="paste-target" tabindex="0">Paste image here</div>
        <div id="upload-status" class="muted-text">Select an agent to upload.</div>
        <div id="uploaded-path-row" class="uploaded-path-row" hidden>
          <div id="uploaded-path-text" class="path-text"></div>
          <div class="row-actions compact-actions">
            <button id="copy-uploaded-path" type="button">Copy path</button>
            <button id="insert-uploaded-path" type="button">Insert path</button>
          </div>
        </div>
      </div>

      <div id="artifact-list" class="artifact-list"></div>
    </aside>
  </main>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>
